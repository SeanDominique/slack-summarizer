# Blok Digest Bot — Slack App Manifest
#
# `setup.py` will generate `generated_manifest.yaml` from this file with the
# real Modal webhook URL substituted in. Use the generated file when creating
# the Slack App.
#
# Note: event_subscriptions are intentionally NOT in this manifest. Slack
# verifies the events request_url at app-creation time, which fails before our
# real Slack signing secret is wired. Setup tells you to add events in the
# Slack UI after deploy completes.
#
display_information:
  name: Blok Digest
  description: Morning Slack digests + on-demand deep research with podcast output.
  background_color: "#1f2937"
  long_description: |
    Blok Digest DMs you a personalized morning summary of the last 24 hours of
    Slack activity, with a to-do list and hyperlinks to the source messages.
    React to any message with the bookmark emoji to add it to your research
    corpus; run /research to get an audio podcast synthesis of everything you
    have bookmarked.
features:
  bot_user:
    display_name: Blok Digest
    always_online: true
  slash_commands:
    - command: /digest
      url: https://REPLACE_WITH_MODAL_URL/slack/events
      description: Daily Slack digest + to-dos in your DMs
      usage_hint: "[on | off | timezone America/New_York]"
      should_escape: false
    - command: /research
      url: https://REPLACE_WITH_MODAL_URL/slack/events
      description: "Podcast deep research over your :bookmark: reactions"
      usage_hint: "since:2026-03-01"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - users:read
      - chat:write
      - chat:write.public
      - commands
      - reactions:read
      - files:write
      - app_mentions:read
settings:
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
